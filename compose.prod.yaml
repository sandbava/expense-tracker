services:

  php:
    build: ./docker/php

  nginx-backend:
    image: nginx:alpine
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/backend.conf:/etc/nginx/conf.d/default.conf

  nginx-frontend:
    image: nginx:alpine
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./docker/nginx/frontend.conf:/etc/nginx/conf.d/default.conf

  database:
    image: postgres:16-alpine